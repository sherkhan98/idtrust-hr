services:
  - type: web
    name: idtrust-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: idtrust-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: idtrust-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NEXTAUTH_SECRET
        value: idtrust-nextauth-secret-prod-2024

databases:
  - name: idtrust-db
    plan: free
    databaseName: idtrust
    user: idtrust
