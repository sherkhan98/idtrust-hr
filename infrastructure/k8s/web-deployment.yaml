apiVersion: apps/v1
kind: Deployment
metadata:
  name: staffflow-web
  namespace: staffflow-hr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: staffflow-web
  template:
    metadata:
      labels:
        app: staffflow-web
    spec:
      containers:
        - name: web
          image: staffflow/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXTAUTH_URL
              value: "https://app.staffflow.uz"
            - name: API_URL
              value: "http://staffflow-api:4000"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: staffflow-secrets
                  key: NEXTAUTH_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: staffflow-web
  namespace: staffflow-hr
spec:
  selector:
    app: staffflow-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
