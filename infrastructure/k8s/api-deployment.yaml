apiVersion: apps/v1
kind: Deployment
metadata:
  name: staffflow-api
  namespace: staffflow-hr
  labels:
    app: staffflow-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: staffflow-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: staffflow-api
    spec:
      containers:
        - name: api
          image: staffflow/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staffflow-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: staffflow-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              value: "staffflow-redis"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: staffflow-api
  namespace: staffflow-hr
spec:
  selector:
    app: staffflow-api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: staffflow-api-hpa
  namespace: staffflow-hr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: staffflow-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
